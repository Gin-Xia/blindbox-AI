services:
  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
      - model_cache:/root/.cache/huggingface
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # give time for CLIP model download on first run

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
  outputs:
  model_cache:     # CLIP + rembg model cache, persisted across restarts
